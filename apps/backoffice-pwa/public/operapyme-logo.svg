<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" fill="none">
  <title>OperaPyme</title>
  <!--
    "o" center: (42, 56)  R=36  r=15  thickness=21
    "p" center: (84, 56)  R=36  r=15  thickness=21
    Overlap x: [48, 78]  width=30
    Clip: diagonal from (48,66) to (78,46) — follows arc-crossing angle
  -->
  <defs>
    <clipPath id="wv">
      <path d="M 48 0 L 78 0 L 78 46 L 48 66 Z"/>
    </clipPath>
  </defs>

  <!-- LAYER 1: "p" ring + descender — Orange #FF7A00 -->
  <path
    d="M 84 20 A 36 36 0 1 1 84 92 A 36 36 0 1 1 84 20 Z
       M 84 41 A 15 15 0 1 0 84 71 A 15 15 0 1 0 84 41 Z"
    fill="#FF7A00" fill-rule="evenodd"
  />
  <!-- p descender: inner/left edge → fine point, outer/right → rounded curve -->
  <path
    d="M 56 70 L 56 104 Q 66 112 74 96 L 74 70 Z"
    fill="#FF7A00"
  />

  <!-- LAYER 2: "o" ring — Navy #2D3E50 -->
  <path
    d="M 42 20 A 36 36 0 1 1 42 92 A 36 36 0 1 1 42 20 Z
       M 42 41 A 15 15 0 1 0 42 71 A 15 15 0 1 0 42 41 Z"
    fill="#2D3E50" fill-rule="evenodd"
  />

  <!-- LAYER 3: "p" clipped to upper-overlap (diagonal boundary) -->
  <path
    d="M 84 20 A 36 36 0 1 1 84 92 A 36 36 0 1 1 84 20 Z
       M 84 41 A 15 15 0 1 0 84 71 A 15 15 0 1 0 84 41 Z"
    fill="#FF7A00" fill-rule="evenodd" clip-path="url(#wv)"
  />

  <!-- Wordmark -->
  <text font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-weight="700" font-size="46">
    <tspan x="134" y="76" fill="#2D3E50">Opera</tspan><tspan fill="#FF7A00">Pyme</tspan>
  </text>

  <!-- Tagline -->
  <text x="134" y="98"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="13" letter-spacing="0.4" fill="#4B637A">
    SaaS for SMB Operations Management
  </text>
</svg>

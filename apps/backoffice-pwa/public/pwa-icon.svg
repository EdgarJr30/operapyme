<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!--
    "o" center: (95, 100)  R=56  r=23  thickness=33
    "p" center: (161, 100) R=56  r=23  thickness=33
    Overlap x: [105, 151]  width=46
    Clip: diagonal from (105,114) to (151,86)
  -->
  <rect width="256" height="256" rx="52" fill="#F4F7F9"/>
  <defs>
    <clipPath id="wv">
      <path d="M 105 0 L 151 0 L 151 86 L 105 114 Z"/>
    </clipPath>
  </defs>

  <!-- LAYER 1: "p" ring + descender — Orange -->
  <path
    d="M 161 44 A 56 56 0 1 1 161 156 A 56 56 0 1 1 161 44 Z
       M 161 77 A 23 23 0 1 0 161 123 A 23 23 0 1 0 161 77 Z"
    fill="#FF7A00" fill-rule="evenodd"
  />
  <path
    d="M 117 122 L 117 176 Q 131 188 143 162 L 143 122 Z"
    fill="#FF7A00"
  />

  <!-- LAYER 2: "o" ring — Navy -->
  <path
    d="M 95 44 A 56 56 0 1 1 95 156 A 56 56 0 1 1 95 44 Z
       M 95 77 A 23 23 0 1 0 95 123 A 23 23 0 1 0 95 77 Z"
    fill="#2D3E50" fill-rule="evenodd"
  />

  <!-- LAYER 3: "p" clipped to upper-overlap -->
  <path
    d="M 161 44 A 56 56 0 1 1 161 156 A 56 56 0 1 1 161 44 Z
       M 161 77 A 23 23 0 1 0 161 123 A 23 23 0 1 0 161 77 Z"
    fill="#FF7A00" fill-rule="evenodd" clip-path="url(#wv)"
  />
</svg>
